name: Deploy Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Validate corpus
        run: node scripts/validate.mjs
      - name: Stage data into docs
        run: |
          mkdir -p docs/insight-library
          cp insight-library/INDEX.json docs/insight-library/INDEX.json
          cp insight-library/INDEX.md docs/insight-library/INDEX.md
          cp insight-library/latest.json docs/insight-library/latest.json
          cp -r insight-library/insights docs/insight-library/
          cp -r insight-library/operators docs/insight-library/
          cp -r insight-library/synthesis docs/insight-library/
          cp -r insight-library/playbooks docs/insight-library/
          cp -r insight-library/00_meta docs/insight-library/
          cp -r insight-library/daily docs/insight-library/
      - name: Build static pages (per-route HTML for crawlers + AI agents)
        run: node scripts/build-static.mjs
      - name: Build per-page OG images
        run: node scripts/build-og.mjs
      - name: Build feeds (sitemap, RSS, robots.txt, agent-permissions.json)
        run: node scripts/build-feeds.mjs
      - name: Validate docs bundle
        run: bash docs/build.sh
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - id: deployment
        uses: actions/deploy-pages@v4
