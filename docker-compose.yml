services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: demandos
      POSTGRES_PASSWORD: demandos
      POSTGRES_DB: demandos
    ports: ["5432:5432"]
    volumes: ["postgres_data:/var/lib/postgresql/data"]
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
  web:
    build: .
    depends_on: [postgres, redis]
    env_file: .env
    ports: ["3000:3000"]
volumes:
  postgres_data:
