# scan-roster.yaml: the daily operator + topic scan list for the abcodex insight routine.
#
# A Claude Code Routine (claude.ai/code/routines) clones this repo each run and
# reads this file to know WHO and WHAT to scan for new operator insights. It is
# the candidate pool, not the full library: abcodex already holds full operator
# profiles under insight-library/operators/. This is the curated set worth
# checking for fresh, mechanism-bearing claims.
#
# Spans the domains this library tracks:
#   - GTM / marketing / sales
#   - iOS and Apple-platform craft, generative art, music and audio
#   - AI-native company building and the future of work
#   - AI builder tech (agents, on-device models, agentic coding, evals)
#
# Public by design. Names only, no private notes, no internal colleagues. Edit
# freely: add an operator under a lane, add a lane, or add a topic. The routine
# searches each operator's recent (last 7 days) public output plus the topic
# terms, then curates the few genuinely new, high-signal claims into insight
# cards per scripts/ingest-prompt.md.
#
# Coverage rule for the routine: you will NOT scan all operators every day.
# Sample broadly across lanes, prioritise operators/lanes with known recent
# activity, and surface only 3 to 7 genuinely new, mechanism-bearing claims.
# Quality over volume. Per-lane duplicates of the same person are intentional.

