<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#f3f5ee" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#0a0e0a" media="(prefers-color-scheme: dark)" />
  <title>a builder's codex — operator insight library</title>
  <meta name="description" content="A primary-source library of operator insights. Atomic claims, named operators, verifiable sources." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Newsreader:opsz,wght@6..72,400;6..72,500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=24" />
  <script>
    // Apply theme override before paint to avoid flash
    (function(){
      try {
        var t = localStorage.getItem('codex-theme');
        if (t === 'dark' || t === 'light') document.documentElement.dataset.theme = t;
      } catch(e){}
    })();
  </script>
</head>
<body>
  <div id="splash" aria-hidden="true">
    <div class="mark"><span class="pulse"></span><span>a builder's codex</span></div>
    <div class="progress"><div class="bar"></div></div>
  </div>

  <div id="scrollProgress"></div>

  <header id="hdr">
    <a href="#/" class="brand"><span class="dot"></span>a builder's codex</a>
    <nav id="nav">
      <a href="#/" data-route="/">home</a>
      <a href="#/map" data-route="/map">map</a>
      <a href="#/operators" data-route="/operators">operators</a>
      <a href="#/patterns" data-route="/patterns">patterns</a>
      <a href="#/playbooks" data-route="/playbooks">playbooks</a>
      <a href="#/browse" data-route="/browse">browse</a>
      <a href="#/timeline" data-route="/timeline">timeline</a>
      <a href="#/today" data-route="/today">today</a>
      <a href="#/about" data-route="/about">about</a>
      <button id="searchOpen" class="always" title="Search (⌘K)">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><circle cx="7" cy="7" r="5"/><path d="m11 11 3 3"/></svg>
        <span>search</span>
        <kbd>⌘K</kbd>
      </button>
      <button id="themeBtn" class="always" aria-label="Toggle theme" title="Toggle theme">
        <svg id="themeIconLight" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="3"/><path d="M8 1.5v1M8 13.5v1M14.5 8h-1M2.5 8h-1M12.6 3.4l-.7.7M4.1 11.9l-.7.7M12.6 12.6l-.7-.7M4.1 4.1l-.7-.7"/></svg>
        <svg id="themeIconDark" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 9.5A6 6 0 1 1 6.5 2 5 5 0 0 0 14 9.5Z"/></svg>
      </button>
      <button id="menuBtn" class="always" aria-label="Open menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 7h16M4 12h16M4 17h16"/></svg>
      </button>
    </nav>
  </header>

  <div id="mobileBackdrop" aria-hidden="true"></div>
  <aside id="mobileMenu" aria-hidden="true">
    <a href="#/" data-route="/">home</a>
    <a href="#/map" data-route="/map">map</a>
    <a href="#/operators" data-route="/operators">operators</a>
    <a href="#/patterns" data-route="/patterns">patterns</a>
    <a href="#/playbooks" data-route="/playbooks">playbooks</a>
    <a href="#/browse" data-route="/browse">browse</a>
    <a href="#/timeline" data-route="/timeline">timeline</a>
    <a href="#/today" data-route="/today">today</a>
    <a href="#/flash" data-route="/flash">flash</a>
    <a href="#/about" data-route="/about">about</a>
  </aside>

  <main id="app"></main>

  <footer>
    <div>made by <a href="https://apps.iamkesava.com" target="_blank" rel="noopener">Kesava</a> · <a href="https://github.com/k3sava/ab-codex" target="_blank" rel="noopener">GitHub</a> · MIT</div>
  </footer>

  <dialog id="searchDialog">
    <div class="search-head">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><circle cx="7" cy="7" r="5"/><path d="m11 11 3 3"/></svg>
      <input id="searchInput" placeholder="search operators, claims, patterns…" autocomplete="off" />
      <kbd>esc</kbd>
    </div>
    <div id="searchResults"></div>
    <div class="search-foot"><span><kbd>↑</kbd><kbd>↓</kbd> navigate</span><span><kbd>⏎</kbd> open</span><span><kbd>⌘</kbd><kbd>⏎</kbd> new tab</span></div>
  </dialog>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <script src="app.js?v=33" type="module"></script>
</body>
</html>
